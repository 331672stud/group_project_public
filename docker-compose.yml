services:
  dev:
    build: .
    container_name: project_dev
    ports:
      - "8443:8443"
    volumes:
      - .:/workspace
      - code_server_config:/home/coder/.local/share/code-server
    environment:
      - PASSWORD=dev
    stdin_open: true
    tty: true
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    container_name: project_web
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/postgres
    depends_on:
      - db
  db:
    image: postgres:latest
    container_name: project_db
    user: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    volumes:
     - ./database:/docker-entrypoint-initdb.d

volumes:
  code_server_config:
  postgres_data:
